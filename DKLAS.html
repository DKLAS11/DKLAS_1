<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DKLAS · المنصة الأسطورية المتكاملة</title>
    
    <style>

        /* ==================== الأساسيات ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000000 !important;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        
        /* تأثير خلفية النجوم التفاعلية المحسن */
        .real-star {
            position: fixed;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: moveUpStars linear infinite;
        }
        @keyframes moveUpStars {
            from { transform: translateY(105vh); }
            to { transform: translateY(-10vh); }
        }
        
        /* إضافة تأثير النجوم التفاعلية (Interactive Stars) */
        body.interactive-galaxy .real-star {
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,215,0,0.4) 70%, rgba(255,215,0,0) 100%);
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s ease-out; /* حركة هروب ناعمة للنجوم */
        }

        .notification-area {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            width: auto;
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        }
        .notification {
            background: rgba(10, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            border-radius: 60px;
            padding: 12px 30px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 0 30px gold;
            margin-bottom: 10px;
            animation: slideDown 0.3s ease;
            pointer-events: auto;
        }
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            touch-action: manipulation;
            display: inline-block;
            text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn:hover { box-shadow: 0 0 20px #ffd700; }
        .btn-outline {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        .logo {
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffd700, #fff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
            text-shadow: 0 0 50px rgba(255,215,0,0.5);
            line-height: 1.2;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .container { width: 100%; padding: 20px; }
        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }
        .landing .logo { font-size: 80px; margin-bottom: 20px; }
        @media (max-width: 480px) {
            .landing .logo { font-size: 60px; }
        }
        .landing .sub { font-size: 24px; color: #ccc; margin-bottom: 40px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .auth-box {
            max-width: 400px;
            margin: 50px auto;
            background: rgba(10, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 40px;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .auth-box h2 { font-size: 28px; }
        @media (max-width: 480px) {
            .auth-box h2 { font-size: 22px; }
        }
        .auth-box input {
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,215,0,0.2);
            outline: none;
        }
        .main-app { display: none; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: rgba(255, 215, 0, 0.2);
            padding: 5px 15px 5px 10px;
            border-radius: 40px;
            border: 1px solid gold;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3a7bd5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid gold;
        }
        .coins {
            color: #ffd700;
            font-weight: bold;
            background: rgba(255,215,0,0.1);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid gold;
        }
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .section-card {
            background: rgba(20,30,50,0.7);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .section-card:active { transform: scale(0.95); }
        .section-icon img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; }
        .section-title { font-size: 18px; font-weight: bold; }
        .content-area {
            background: rgba(10,20,40,0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 500px;
        }
        .content-header {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            color: #ffd700;
            text-shadow: 0 0 15px gold;
        }
        .games-display-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
        }
        .game-item-card {
            background: rgba(255,255,255,0.03);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .game-item-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        .shop-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .shop-tabs-nav {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 5px;
            gap: 5px;
        }
        .shop-tab-trigger {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            background: transparent;
            color: #aaa;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .shop-tab-trigger.active {
            background: #ffd700;
            color: #000;
        }
        .sub-filter-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }
        .sub-filter-bar::-webkit-scrollbar { display: none; }
        .filter-node {
            background: rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-node.active {
            border-color: #ffd700;
            color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        .products-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .p-card {
            background: rgba(255,255,255,0.04);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
            transition: 0.3s;
        }
        .p-image-box {
            width: 100%;
            height: 90px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .p-title-text { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .p-info-text { font-size: 10px; color: #aaa; height: 30px; overflow: hidden; line-height: 1.2; }
        .p-price-tag { color: #ffd700; font-size: 14px; font-weight: bold; margin: 10px 0; }
        .real-category-block { margin-bottom: 30px; }
        .real-category-title {
            border-right: 4px solid #ffd700;
            padding-right: 12px;
            font-size: 18px;
            margin-bottom: 15px;
            color: #fff;
        }
        .under-construction {
            text-align: center;
            padding: 40px;
            color: gold;
            font-size: 24px;
            background: rgba(255,215,0,0.1);
            border-radius: 30px;
        }
        .ai-zone { display: flex; flex-direction: column; height: 450px; }
        .ai-logs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 18px; border-radius: 20px; font-size: 14px; max-width: 85%; }
        .bot-bubble { background: #3a4b7d; align-self: flex-start; border-bottom-right-radius: 5px; }
        .user-bubble { background: rgba(255,215,0,0.2); border: 1px solid gold; align-self: flex-end; border-bottom-left-radius: 5px; }
        /* تحسينات المخزن */
        .file-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .file-card {
            background: rgba(20,30,50,0.8);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid #444;
            position: relative;
        }
        .file-icon { font-size: 40px; margin-bottom: 8px; }
        .file-name { font-size: 12px; word-break: break-word; margin-bottom: 8px; }
        .file-actions {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 8px;
        }
        .file-action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid gold;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .file-action-btn:hover { background: rgba(255,215,0,0.3); }
        .file-delete {
            background: rgba(255,0,0,0.2);
            border: 1px solid red;
        }
        .file-image-preview {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        /* نهاية تحسينات المخزن */
        /* صفحة نهاية اللعبة - بسيطة ونظيفة */
        .game-end-screen {
            text-align: center;
            padding: 20px;
            border-radius: 40px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .game-end-win {
            background: rgba(0, 100, 0, 0.7);
            border: 3px solid #00ff00;
            box-shadow: 0 0 30px green;
        }
        .game-end-lose {
            background: rgba(100, 0, 0, 0.7);
            border: 3px solid red;
            box-shadow: 0 0 30px red;
        }
        .game-end-icon { font-size: 100px; margin-bottom: 20px; }
        .game-end-title { font-size: 48px; font-weight: bold; margin-bottom: 20px; }
        .game-end-rewards {
            background: rgba(255,215,0,0.15);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            font-size: 28px;
        }
        .game-end-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .profile-section { margin-bottom: 30px; }
        .profile-section-title {
            font-size: 24px;
            color: gold;
            border-bottom: 2px solid gold;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
        }
        .stat-card-title { font-size: 16px; color: #aaa; margin-bottom: 10px; }
        .stat-card-value { font-size: 24px; font-weight: bold; color: gold; }
        .stat-sub { font-size: 12px; color: #888; margin-top: 5px; }
        .ownership-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .owned-item {
            background: rgba(255,215,0,0.1);
            border: 1px solid gold;
            border-radius: 15px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }
        .owned-item-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 5px;
        }
        .owned-item-name { font-size: 10px; word-break: break-word; }
        .item-detail-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            border: 2px solid gold;
            border-radius: 30px;
            padding: 25px;
            z-index: 3000;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2999;
        }
        .hidden { display: none; }
        
        /* تأثيرات خاصة بالعملة المتطايرة */
        .floating-coin {
            position: fixed;
            z-index: 3000; /* فوق كل شيء */
            font-size: 24px;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); /* حركة انسيابية ناعمة */
            opacity: 1;
            transform: scale(1);
            text-shadow: 0 0 10px gold; /* توهج ذهبي للعملة */
        }

        @media (min-width: 992px) {
            .sections-grid { grid-template-columns: repeat(4, 1fr); }
            .products-container { grid-template-columns: repeat(4, 1fr); }
            .games-display-grid { grid-template-columns: repeat(4, 1fr); }
            .file-box { grid-template-columns: repeat(4, 1fr); }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .ownership-grid { grid-template-columns: repeat(5, 1fr); }
        }
/* تنسيق خاص لتصغير صور المنتجات في المتجر */
.p-image-box {
    width: 100% !important;   /* تأخذ عرض الكارد */
    height: 120px !important; /* قمنا بتحديد ارتفاع ثابت (يمكنك تغييره لـ 100px إذا أردتها أصغر) */
    object-fit: contain !important; /* لضمان ظهور الصورة كاملة بدون قص */
    background: rgba(0, 0, 0, 0.2); /* خلفية خفيفة خلف الصورة */
    padding: 5px;
    margin-bottom: 10px;
}

/* تصغير كروت المنتجات نفسها لتناسب الشاشة بشكل أفضل */
.p-card {
    padding: 10px !important;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

    </style>
</head>
<body class="interactive-galaxy"> <div id="notificationArea" class="notification-area"></div>
    <div id="landingPage" class="container landing">
        <div class="logo">DKLAS</div>
        <div class="sub">منصتك الالكترونية الشاملة بدون انترنت</div>
        <div class="btn-group">
            <button class="btn" onclick="navigation.to('login')">تسجيل الدخول</button>
            <button class="btn btn-outline" onclick="navigation.to('register')">إنشاء حساب جديد</button>
        </div>
    </div>
    <div id="loginPage" class="container" style="display:none;">
        <div class="auth-box">
            <h2 style="text-align: center; margin-bottom: 25px; color: #ffd700;">مرحباً بعودتك</h2>
            <input type="text" id="loginUser" placeholder="اسم المستخدم">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="auth.login()">تسجيل الدخول</button>
            <div style="text-align: center; margin-top: 20px; color: #888; cursor: pointer;" onclick="navigation.to('landing')">الرجوع للرئيسية</div>
        </div>
    </div>
    <div id="registerPage" class="container" style="display:none;">
        <div class="auth-box">
            <h2 style="text-align: center; margin-bottom: 25px; color: #ffd700;">حساب جديد</h2>
            <input type="text" id="regUser" placeholder=" اسم مستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور ">
            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="auth.register()">تأكيد الحساب</button>
            <div style="text-align: center; margin-top: 20px; color: #888; cursor: pointer;" onclick="navigation.to('landing')">الرجوع للرئيسية</div>
        </div>
    </div>
    <div id="mainApp" class="container main-app">
        <nav class="navbar">
            <div class="user-info" onclick="ui.showProfile()">
            <div class="avatar" id="avatarDisplay" onclick="document.getElementById('avatarInput').click()" style="cursor: pointer; overflow: hidden;">👤</div>
<input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="logic.changeAvatar(this)">
                <div>
                    <span id="navUsername" style="display: block; font-weight: bold;">الأسطورة</span>
                    <span id="navLevel" class="level-badge" style="font-size: 10px; opacity: 0.7;">المستوى 1</span>
                    <div style="width: 100px; height: 5px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 5px; margin-top: 4px; overflow: hidden;">
                        <div id="xpBarFill" style="height: 100%; width: 0%; background: linear-gradient(90deg, #ffd700, #fff); transition: 0.5s;"></div>
                    </div>
                </div>
            </div>
            <div class="coins" id="navCoinsArea">🪙 <span id="navCoins">0</span></div>
        </nav>
        <div style="text-align: center; margin: 20px 0;">
            <div class="logo" style="font-size: 60px;">DKLAS</div>
        </div>
        <div class="sections-grid">
            <div class="section-card" onclick="ui.renderSection('games')">
                <div class="section-icon"><img src="IMAGES/game.webp" alt="Games"></div>
                <div class="section-title">الألعاب</div>
            </div>
            <div class="section-card" onclick="ui.renderSection('ai')">
                <div class="section-icon"><img src="IMAGES/ai.webp" alt="AI"></div>
                <div class="section-title">D-BOT</div>
            </div>
            <div class="section-card" onclick="ui.renderSection('storage')">
                <div class="section-icon"><img src="IMAGES/folder.webp" alt="Storage"></div>
                <div class="section-title">المخزن</div>
            </div>
            <div class="section-card" onclick="ui.renderSection('shop')">
                <div class="section-icon"><img src="IMAGES/cart.webp" alt="Shop"></div>
                <div class="section-title">المتجر</div>
            </div>
        </div>
        <div class="content-area" id="mainDisplay">
            <div class="content-header" id="displayTitle">أهلاً بك</div>
            <div id="displayBody"><p style="text-align: center; color: #888;">اختر قسماً من الأعلى للبدء..</p></div>
        </div>
    </div>
    <div id="itemDetailModal" class="hidden">
        <div class="modal-overlay" onclick="ui.hideItemDetail()"></div>
        <div class="item-detail-modal">
            <img id="detailImg" src="" style="width:100px; height:100px; object-fit:cover; border-radius:20px; margin-bottom:10px;">
            <div id="detailName" style="font-size:20px; font-weight:bold; color:gold;"></div>
            <div id="detailDesc" style="margin:10px 0; color:#aaa;"></div>
            <div id="detailPrice" style="color:#fff;">تم الشراء بـ: 🪙 <span id="detailPriceSpan"></span></div>
            <button class="btn" style="margin-top:20px;" onclick="ui.hideItemDetail()">إغلاق</button>
        </div>
    </div>

    <script>
        // ==================== الحالة الأساسية ====================
        let state = {
            users: JSON.parse(localStorage.getItem('dklas_db')) || [],
            currentUser: null,
            currentShopTab: 'trophy',
            currentFilter: 'all',
            viewingItem: null
        };

        // تأكد من أن كل مستخدم لديه الإحصائيات والمصفوفات اللازمة
        state.users = state.users.map(user => {
            if (!user.stats) {
                user.stats = {
                    xo: { wins: 0, losses: 0, plays: 0, coinsEarned: 0 },
                    rps: { wins: 0, losses: 0, plays: 0, coinsEarned: 0 },
                    memory: { wins: 0, losses: 0, plays: 0, coinsEarned: 0 },
                    guess: { wins: 0, losses: 0, plays: 0, coinsEarned: 0 }
                };
            }
            if (!user.inventory) user.inventory = [];
            if (!user.files) user.files = [];
            return user;
        });
        localStorage.setItem('dklas_db', JSON.stringify(state.users));

        // ==================== التنقل ====================
        const navigation = {
            to: function(pageId) {
                const pages = ['landingPage', 'loginPage', 'registerPage', 'mainApp'];
                pages.forEach(p => document.getElementById(p).style.display = 'none');
                if (pageId === 'landing') document.getElementById('landingPage').style.display = 'flex';
                else if (pageId === 'login') document.getElementById('loginPage').style.display = 'block';

                const emailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/; 
                // التحقق أن الرمز 8 خانات على الأقل (أحرف إنجليزية وأرقام فقط)
                const passRegex = /^[a-zA-Z0-9]{8,}$/; 

                if(!u || !p || !e) return ui.notify("يرجى تعبئة كافة الحقول!");

                // تطبيق الشروط الجديدة
                if (!emailRegex.test(e)) {
                    return ui.notify("خطأ: البريد يجب أن يكون Gmail وبالإنجليزية فقط!");

                if (!passRegex.test(p)) {
                    return ui.notify("خطأ: الرمز 8 خانات على الأقل (أحرف إنجليزية وأرقام فقط)!");
                }

                        preview = `<img src="${f.data}" class="file-image-preview" onclick="window.open('${f.data}', '_blank')" title="اضغط للتكبير">`;

                        if (f.name.endsWith('.mp3') || f.name.endsWith('.wav')) icon = '🎵';
                        else if (f.name.endsWith('.pdf')) icon = '📕';
                        else if (f.name.endsWith('.txt')) icon = '📃';
                        else if (f.name.endsWith('.zip') || f.name.endsWith('.rar')) icon = '📦';
                        else icon = '📄';

            showGameEnd: function(isWin, gameName, coinsReward, xpReward, gameKey, retryFunctionName) {
                const body = document.getElementById('displayBody');
                const title = document.getElementById('displayTitle');
                title.innerText = isWin ? '' : '';
                
                if (state.currentUser && state.currentUser.stats && state.currentUser.stats[gameKey]) {
                    const stats = state.currentUser.stats[gameKey];
                    stats.plays = (stats.plays || 0) + 1;
                    if (isWin) {
                        stats.wins = (stats.wins || 0) + 1;
                        stats.coinsEarned = (stats.coinsEarned || 0) + coinsReward;
                        // تأخير إضافة العملات قليلاً حتى تنتهي حركة العملات
                        setTimeout(() => {
                            state.currentUser.coins += coinsReward;
                            auth.save();
                        }, 800);
                        
                        state.currentUser.xp = (state.currentUser.xp || 0) + xpReward;
                        if (state.currentUser.xp >= 100) { state.currentUser.level++; state.currentUser.xp -= 100; }
                    } else {
                        stats.losses = (stats.losses || 0) + 1;
                    }
                    auth.save();
                }
                
                const winContent = `
                    <div class="game-end-screen game-end-win">
                        <div class="game-end-icon" id="winIcon">🏆</div> <div class="game-end-title">فوز!</div>
                        <div class="game-end-rewards">🪙 +${coinsReward} عملة | ✨ +${xpReward} XP</div>
                        <div class="game-end-buttons">
                            <button class="btn" onclick="${retryFunctionName}()">🔄 إعادة اللعب</button>
                            <button class="btn btn-outline" onclick="ui.renderSection('games')">🏠 الرئيسية</button>
                        </div>
                    </div>
                `;
                const loseContent = `
                    <div class="game-end-screen game-end-lose">
                        <div class="game-end-icon">💔</div>
                        <div class="game-end-title">للأسف خسرت</div>
                        <p style="margin-bottom:20px;">لا يوجد مكافآت في حالة الخسارة</p>
                        <div class="game-end-buttons">
                            <button class="btn" onclick="${retryFunctionName}()">🔄 إعادة اللعب</button>
                            <button class="btn btn-outline" onclick="ui.renderSection('games')">🏠 الرئيسية</button>
                        </div>
                    </div>
                `;
                body.innerHTML = isWin ? winContent : loseContent;
                
                // تفعيل أنيميشن العملات عند الفوز
                if (isWin && coinsReward > 0) {
                    logic.animateCoins('win');
                }
            },

                const user = state.currentUser;
                const stats = user.stats || { xo:{wins:0,losses:0,plays:0,coinsEarned:0}, rps:{wins:0,losses:0,plays:0,coinsEarned:0}, memory:{wins:0,losses:0,plays:0,coinsEarned:0}, guess:{wins:0,losses:0,plays:0,coinsEarned:0} };
                let html = `<div class="profile-section"><div class="profile-section-title">الإحصائيات</div><div class="stats-grid">`;
                html += `<div class="stat-card"><div class="stat-card-title">XO</div><div class="stat-card-value">${stats.xo.wins} فوز</div><div class="stat-sub">خسارة: ${stats.xo.losses} | لعب: ${stats.xo.plays} | عملات: ${stats.xo.coinsEarned}</div></div>`;
                html += `<div class="stat-card"><div class="stat-card-title">حجرة ورقة مقص</div><div class="stat-card-value">${stats.rps.wins} فوز</div><div class="stat-sub">خسارة: ${stats.rps.losses} | لعب: ${stats.rps.plays} | عملات: ${stats.rps.coinsEarned}</div></div>`;
                html += `<div class="stat-card"><div class="stat-card-title">الذاكرة الفضائية</div><div class="stat-card-value">${stats.memory.wins} فوز</div><div class="stat-sub">خسارة: ${stats.memory.losses} | لعب: ${stats.memory.plays} | عملات: ${stats.memory.coinsEarned}</div></div>`;
                html += `<div class="stat-card"><div class="stat-card-title">تخمين الأرقام</div><div class="stat-card-value">${stats.guess.wins} فوز</div><div class="stat-sub">خسارة: ${stats.guess.losses} | لعب: ${stats.guess.plays} | عملات: ${stats.guess.coinsEarned}</div></div>`;
                html += `</div></div><div class="profile-section"><div class="profile-section-title">الممتلكات</div>`;
                if (user.inventory && user.inventory.length > 0) {
                    const trophyItems = user.inventory.filter(item => item.cat && item.cat !== 'real');
                    const realItems = user.inventory.filter(item => item.cat === 'real');
                    if (trophyItems.length > 0) {
                        html += `<div style="margin-bottom:15px;"><h3 style="color:gold;"> التروفي</h3>`;
                        ['cande','heavenly','savage','space'].forEach(cat => {
                            const items = trophyItems.filter(item => item.cat === cat);
                            if (items.length > 0) {
                                html += `<div style="margin:10px 0;"><span style="color:#aaa;">${cat.toUpperCase()}</span><div class="ownership-grid">`;
                                items.forEach(item => {
                                    html += `<div class="owned-item" onclick="ui.showItemDetail('${item.id}')"><img src="${item.img}" class="owned-item-img" onerror="this.src='https://via.placeholder.com/50/222/ffd700?text=DKLAS'"><div class="owned-item-name">${item.name}</div></div>`;
                                });
                                html += `</div></div>`;
                            }
                        });
                        html += `</div>`;
                    }
                    if (realItems.length > 0) {
                        html += `<div><h3 style="color:gold;">انماط</h3><div class="ownership-grid">`;
                        realItems.forEach(item => {
                            html += `<div class="owned-item" onclick="ui.showItemDetail('${item.id}')"><img src="${item.img}" class="owned-item-img" onerror="this.src='https://via.placeholder.com/50/222/ffd700?text=DKLAS'"><div class="owned-item-name">${item.name}</div></div>`;
                        });
                        html += `</div></div>`;
                    }
                } else {
                    html += `<p style="text-align:center; color:#888;">لا تمتلك أي منتجات بعد</p>`;
                }
                html += `</div>`;
                body.innerHTML = html;
            },
            showItemDetail: function(itemId) {
                const item = state.currentUser.inventory.find(i => i.id == itemId);
                if (!item) return;
                document.getElementById('detailImg').src = item.img;
                document.getElementById('detailName').innerText = item.name;
                document.getElementById('detailDesc').innerText = item.desc || 'لا يوجد وصف';
                document.getElementById('detailPriceSpan').innerText = item.price !== undefined ? item.price : '?';
                document.getElementById('itemDetailModal').classList.remove('hidden');
            },
            hideItemDetail: function() { document.getElementById('itemDetailModal').classList.add('hidden'); }
        };

        // ==================== المنطق ====================
        const logic = {
            buyItem: function(id, price, name, img, desc, cat) {
                if (!state.currentUser) return ui.notify("يجب تسجيل الدخول أولاً");
                if(state.currentUser.coins < price) return ui.notify("لا تملك عملات كافية!");
                
                // تشغيل أنيميشن طيران العملات من فوق (Navbar) لتحت (المنتج)
                this.animateCoins('buy', id);
                
                // تأخير الخصم والحفظ حتى تنتهي الحركة
                setTimeout(() => {
                    state.currentUser.coins -= price;
                    if (!state.currentUser.inventory) state.currentUser.inventory = [];
                    state.currentUser.inventory.push({id, name, img, desc, price, cat});
                    auth.save();
                    ui.notify(`مبروك! تمت إضافة [${name}] إلى حسابك.`);
                }, 800); // 800ms هي مدة الأنيميشن
            },
            uploadFile: function(input) {
                if (!state.currentUser) return ui.notify("يجب تسجيل الدخول أولاً");
                const file = input.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = { name: file.name, type: file.type, data: e.target.result };
                    if (!state.currentUser.files) state.currentUser.files = [];
                    state.currentUser.files.push(fileData);
                    auth.save(); ui.updateFileList(); ui.notify("تم رفع الملف بنجاح");
                };
                if (file.type.startsWith('image/') || file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    reader.readAsDataURL(file);
                } else {
                    state.currentUser.files.push({ name: file.name, type: file.type, data: null });
                    auth.save(); ui.updateFileList(); ui.notify("تم رفع الملف بنجاح (بدون محتوى)");
                }
            },
            deleteFile: function(index) {
                if (!state.currentUser) return;
                if (state.currentUser.files && state.currentUser.files[index]) {
                    state.currentUser.files.splice(index, 1);
                    auth.save(); ui.updateFileList(); ui.notify("تم حذف الملف");
                }
            },
            askAI: async function() {
                const inp = document.getElementById('aiInp');
                const logs = document.getElementById('aiLogs');
                const txt = inp.value.trim();
                if(!txt) return;
                logs.innerHTML += `<div class="bubble user-bubble">${txt}</div>`;
                inp.value = '';
                const botMsg = document.createElement('div');
                botMsg.className = 'bubble bot-bubble';
                botMsg.innerText = "جاري التفكير في إجابة ...";
                logs.appendChild(botMsg);
                logs.scrollTop = logs.scrollHeight;
                try {
                    const res = await fetch(`https://ar.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(txt)}`);
                    const data = await res.json();
                    botMsg.innerText = data.extract || "عذراً، لم أجد معلومات دقيقة حول هذا الموضوع في قاعدة بياناتي حالياً.";
                } catch(e) { botMsg.innerText = "حدث خطأ في الاتصال بالسحابة الذكية."; }
                logs.scrollTop = logs.scrollHeight;
            },
            
            // دالة الأنيميشن الرئيسية للعملات المتطايرة
            animateCoins: function(type, productId) {
                // عدد العملات التي ستطير (لإعطاء تأثير كثافة)
                const numCoins = type === 'win' ? 10 : 5; 
                
                // تحديد عنصر البداية والنهاية بناءً على نوع الحركة
                let startEl, endEl;
                
                if (type === 'buy') {
                    // من الـ Navbar (فوق) للكارت (تحت)
                    startEl = document.getElementById('navCoinsArea');
                    endEl = document.getElementById('product-' + productId);
                } else {
                    // من شاشة الفوز (تحت) للـ Navbar (فوق)
                    startEl = document.getElementById('winIcon'); 
                    endEl = document.getElementById('navCoinsArea');
                }
                
                if (!startEl || !endEl) return; // حماية في حال عدم وجود العناصر

                // الحصول على إحداثيات العناصر في الشاشة
                const startRect = startEl.getBoundingClientRect();
                const endRect = endEl.getBoundingClientRect();

                // حساب نقطة المركز للعنصر البداية والنهاية
                const startX = startRect.left + startRect.width / 2;
                const startY = startRect.top + startRect.height / 2;
                const endX = endRect.left + endRect.width / 2;
                const endY = endRect.top + endRect.height / 2;

                // إنشاء العملات المتعددة
                for (let i = 0; i < numCoins; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'floating-coin';
                    coin.innerText = '🪙';
                    
                    // وضع العملة في نقطة البداية مبدئياً خارج الشاشة
                    coin.style.left = startX + 'px';
                    coin.style.top = startY + 'px';
                    
                    document.body.appendChild(coin);

                    // استخدام setTimeout لإعطاء العملات تأخيراً بسيطاً بين كل واحدة
                    setTimeout(() => {
                        // إرسال العملة للهدف (النهاية)
                        coin.style.left = endX + 'px';
                        coin.style.top = endY + 'px';
                        
                        // تصغير وتخفية العملة في نهاية الحركة
                        setTimeout(() => {
                            coin.style.opacity = '0';
                            coin.style.transform = 'scale(0.2)';
                            
                            // حذف العنصر من الـ DOM نهائياً
                            setTimeout(() => coin.remove(), 800);
                        }, 600); // 600ms تبدأ بعد 200ms من الحركة
                        
                    }, i * 100); // تأخير بين كل عملة وعملة (100ms)
                }
            }
        };

        // ==================== الألعاب ====================
        function game_xo() {
            let winsX = 0, winsO = 0;
            let board = Array(9).fill(null);
            let currentPlayer = 'X';
            let gameActive = true;
            const body = document.getElementById('displayBody');
            body.innerHTML = `<div style="text-align:center; margin-bottom:20px;"><span style="color:gold;">X: <span id="xWins">0</span></span> | <span style="color:silver;">O: <span id="oWins">0</span></span></div><div id="xo_board" style="display:grid; grid-template-columns:repeat(3, 80px); gap:10px; justify-content:center; margin-top:10px;"></div>`;
            const renderBoard = () => {
                const grid = document.getElementById('xo_board');
                if (!grid) return;
                grid.innerHTML = '';
                board.forEach((val, i) => {
                    const cell = document.createElement('div');
                    cell.style = "width:80px; height:80px; background:#222; border:1px solid gold; display:flex; align-items:center; justify-content:center; font-size:30px; border-radius:15px;";
                    cell.innerText = val || '';
                    cell.onclick = () => {
                        if (!gameActive || board[i] || currentPlayer !== 'X') return;
                        makeMove(i, 'X');
                    };
                    grid.appendChild(cell);
                });
            };
            const makeMove = (index, player) => {
                board[index] = player;
                renderBoard();
                const winner = checkWinner();
                if (winner) {
                    if (winner === 'X') winsX++; else winsO++;
                    document.getElementById('xWins').innerText = winsX;
                    document.getElementById('oWins').innerText = winsO;
                    if (winsX === 2) { gameActive = false; ui.showGameEnd(true, "XO", 10, 20, 'xo', 'game_xo'); }
                    else if (winsO === 2) { gameActive = false; ui.showGameEnd(false, "XO", 0, 0, 'xo', 'game_xo'); }
                    else { board = Array(9).fill(null); currentPlayer = 'X'; renderBoard(); }
                } else {
                    if (!board.includes(null)) {
                        board = Array(9).fill(null);
                        currentPlayer = 'X';
                        renderBoard();
                    } else {
                        currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
                        if (currentPlayer === 'O' && gameActive) setTimeout(aiMove, 500);
                    }
                }
            };
            const aiMove = () => {
                if (!gameActive) return;
                let empty = board.map((v,i) => v===null?i:null).filter(v=>v!==null);
                if (empty.length) makeMove(empty[Math.floor(Math.random()*empty.length)], 'O');
            };
            const checkWinner = () => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for(let [a,b,c] of lines) if(board[a] && board[a]===board[b] && board[a]===board[c]) return board[a];
                return null;
            };
            renderBoard();
        }

        function game_rps() {
            let userWins = 0, botWins = 0, round = 0;
            const totalRounds = 5;
            const body = document.getElementById('displayBody');
            body.innerHTML = `
                <div style="text-align:center;">
                    <p style="margin-bottom:20px;">الجولة <span id="roundCounter">1</span> / 5</p>
                    <div style="margin-bottom:10px;"><span style="color:gold;">أنت: <span id="userScore">0</span></span> | <span style="color:silver;">الخصم: <span id="botScore">0</span></span></div>
                    <div class="btn-group">
                        <button class="btn" onclick="playRPSRound('حجرة')">🧱 حجرة</button>
                        <button class="btn" onclick="playRPSRound('ورقة')">📜 ورقة</button>
                        <button class="btn" onclick="playRPSRound('مقص')">✂️ مقص</button>
                    </div>
                    <div id="rpsRes" style="margin-top:30px; font-size:16px; color:#aaa; max-height:150px; overflow-y:auto;"></div>
                </div>
            `;
            window.playRPSRound = (user) => {
                if (round >= totalRounds) return;
                const options = ['حجرة', 'ورقة', 'مقص'];
                const bot = options[Math.floor(Math.random()*3)];
                let res = "";
                if (user === bot) res = "تعادل!";
                else if ((user==='حجرة' && bot==='مقص') || (user==='ورقة' && bot==='حجرة') || (user==='مقص' && bot==='ورقة')) {
                    res = "فوز!"; userWins++;
                } else { res = "خسارة!"; botWins++; }
                round++;
                document.getElementById('userScore').innerText = userWins;
                document.getElementById('botScore').innerText = botWins;
                if(round < totalRounds) document.getElementById('roundCounter').innerText = round + 1;
                document.getElementById('rpsRes').innerHTML += `<div>الجولة ${round}: أنت ${user} ، الخصم ${bot} - ${res}</div>`;
                if (round === totalRounds) {
                    setTimeout(() => {
                        if (userWins > botWins) ui.showGameEnd(true, "RPS", 5, 10, 'rps', 'game_rps');
                        else ui.showGameEnd(false, "RPS", 0, 0, 'rps', 'game_rps');
                    }, 800);
                }
            };
        }

        function game_memory() {
            const attemptsMax = 50; let attemptsLeft = attemptsMax;
            let cards = [], flippedCards = [], matched = [];
            const spaceSymbols = ['🌍','🌕','🌟','☄️','🪐','🌠','🌌','👽','🛸','🔭','🚀','🌑'];
            for (let i=0; i<12; i++) cards.push(spaceSymbols[i], spaceSymbols[i]);
            cards = cards.sort(() => Math.random() - 0.5);
            const body = document.getElementById('displayBody');
            body.innerHTML = `<div style="text-align:center; margin-bottom:15px;"><span>محاولات متبقية: <span id="attemptsLeft">${attemptsLeft}</span> / ${attemptsMax}</span></div><div id="memoryBoard" style="display:grid; grid-template-columns:repeat(6, 1fr); gap:8px; max-width:500px; margin:auto;"></div>`;
            const board = document.getElementById('memoryBoard');
            const renderBoard = () => {
                board.innerHTML = '';
                for (let i=0; i<cards.length; i++) {
                    const card = document.createElement('div');
                    card.style = `aspect-ratio:1; background:${matched.includes(i) ? '#0a2a2a' : (flippedCards.includes(i) ? '#3a5a5a' : '#111')}; border:2px solid gold; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; transition:0.3s;`;
                    if (matched.includes(i) || flippedCards.includes(i)) card.innerText = cards[i];
                    else card.innerText = '?';
                    card.onclick = () => {
                        if (matched.includes(i) || flippedCards.includes(i) || flippedCards.length === 2) return;
                        flippedCards.push(i); renderBoard();
                        if (flippedCards.length === 2) {
                            attemptsLeft--; document.getElementById('attemptsLeft').innerText = attemptsLeft;
                            if (cards[flippedCards[0]] === cards[flippedCards[1]]) {
                                matched.push(flippedCards[0], flippedCards[1]); flippedCards = []; renderBoard();
                                if (matched.length === cards.length) ui.showGameEnd(true, "Memory", 25, 50, 'memory', 'game_memory');
                            } else { setTimeout(() => { flippedCards = []; renderBoard(); }, 800); }
                            if (attemptsLeft <= 0 && matched.length < cards.length) ui.showGameEnd(false, "Memory", 0, 0, 'memory', 'game_memory');
                        }
                    };
                    board.appendChild(card);
                }
            };
            renderBoard();
        }

        function game_guess() {
            let target = Math.floor(Math.random()*100)+1;
            let attemptsLeft = 10;
            const body = document.getElementById('displayBody');
            body.innerHTML = `<div style="text-align:center;"><p>خمن الرقم بين 1 و 100</p><p>محاولات متبقية: <span id="attemptsLeft">${attemptsLeft}</span> / 10</p><input type="number" id="gInp" style="padding:10px; border-radius:10px; margin:20px 0; width:100px; background:#222; border:1px solid gold; color:white;"><br><button class="btn" onclick="checkGuess()">تخمين</button><p id="gHint" style="margin-top:20px; color:gold;"></p></div>`;
            window.checkGuess = () => {
                const val = parseInt(document.getElementById('gInp').value);
                const hint = document.getElementById('gHint');
                if (isNaN(val)) return ui.notify("أدخل رقماً");
                attemptsLeft--; document.getElementById('attemptsLeft').innerText = attemptsLeft;
                if (val === target) ui.showGameEnd(true, "Guess", 20, 30, 'guess', 'game_guess');
                else if (attemptsLeft <= 0) ui.showGameEnd(false, "Guess", 0, 0, 'guess', 'game_guess');
                else if (val > target) hint.innerText = "أصغر ! ⬇️";
                else hint.innerText = "أكبر ! ⬆️";
            };
        }

        // ==================== التهيئة ====================
        function initGalaxy() {
            // إضافة النجوم الأصلية للتحرك الرأسي
            for (let i=0; i<70; i++) {
                const star = document.createElement('div');
                star.className = 'real-star';
                const size = Math.random()*2+1+'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random()*100+'vw';
                star.style.animationDuration = Math.random()*15+10+'s';
                star.style.animationDelay = Math.random()*-15+'s';
                document.body.appendChild(star);
            }
            
            // إضافة منطق التفاعل مع الماوس/اللمس للنجوم التفاعلية
            document.body.addEventListener('mousemove', function(e) {
                // تفعيل التفاعل فقط إذا كان الكلاس موجوداً
                if (!document.body.classList.contains('interactive-galaxy')) return;
                
                const allStars = document.querySelectorAll('.real-star');
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                
                allStars.forEach(star => {
                    const rect = star.getBoundingClientRect();
                    const starX = rect.left + rect.width / 2;
                    const starY = rect.top + rect.height / 2;
                    
                    // حساب المسافة بين النجمة ومكان الماوس
                    const distX = mouseX - starX;
                    const distY = mouseY - starY;
                    const dist = Math.sqrt(distX*distX + distY*distY);
                    
                    // إذا كان الماوس قريباً، نجعل النجمة "تهرب" لمسافة صغيرة جداً
                    if (dist < 80) { // نصف قطر التأثير (pixels)
                        const power = (80 - dist) / 80; // شدة الهروب (0 to 1)
                        const moveX = distX * power * 0.1; // لمسة هروب خفيفة جداً ورأسية للأعلى
                        const moveY = distY * power * 0.1;
                        
                        // نغير موقع النجمة مؤقتاً بالـ transform
                        star.style.transform = `translate(${moveX}px, ${moveY}px)`;
                        
                        // إعادة النجمة لمكانها الأصلي بعد فترة بسيطة جداً
                        setTimeout(() => {
                             if (dist >= 80) { // تأكد أن الماوس خرج من المنطقة
                                 star.style.transform = 'translate(0, 0)';
                             }
                        }, 200);
                    } else {
                        // إذا خرج الماوس، تعود لمكانها
                        star.style.transform = 'translate(0, 0)';
                    }
                });
            });
            
            // نفس المنطق للمس (Touch) للأجهزة المحمولة
            document.body.addEventListener('touchmove', function(e) {
                if (!document.body.classList.contains('interactive-galaxy')) return;
                
                const allStars = document.querySelectorAll('.real-star');
                const touch = e.touches[0];
                const mouseX = touch.clientX;
                const mouseY = touch.clientY;
                
                allStars.forEach(star => {
                    // (نفس منطق mousemove تماماً هنا)
                    const rect = star.getBoundingClientRect();
                    const starX = rect.left + rect.width / 2;
                    const starY = rect.top + rect.height / 2;
                    const distX = mouseX - starX;
                    const distY = mouseY - starY;
                    const dist = Math.sqrt(distX*distX + distY*distY);
                    if (dist < 80) {
                        const power = (80 - dist) / 80;
                        const moveX = distX * power * 0.1;
                        const moveY = distY * power * 0.1;
                        star.style.transform = `translate(${moveX}px, ${moveY}px)`;
                        setTimeout(() => star.style.transform = 'translate(0, 0)', 200);
                    } else {
                        star.style.transform = 'translate(0, 0)';
                    }
                });
            }, { passive: true }); // passive للأداء الجيد للمس الرأسي والأفقي
        }
        
        window.onload = () => { initGalaxy(); navigation.to('landing'); };
    </script>
